name: Deploy to Amazon ECS
on:
  push:
    branches: [ "main" ]
env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: wsc-cicd-ecr
  ECS_SERVICE: wsc-cicd-ecs-svc
  ECS_CLUSTER: wsc-cicd-ecs-cluster
  ECS_TASK_DEFINITION_FAMILY: wsc-cicd-ecs-taskdef
  CONTAINER_NAME: wsc-cicd-ecs-cnt
permissions:
  contents: read
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Determine next image tag (v1.0.x)
      id: next-tag
      env:
        ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
      run: |
        LATEST=$(aws ecr describe-images \
          --repository-name "$ECR_REPOSITORY" \
          --query "imageDetails[].imageTags[]" \
          --output text 2>/dev/null \
          | tr '\t' '\n' \
          | grep -E '^v1\.0\.[0-9]+$' \
          | sort -t. -k3 -n \
          | tail -1)

        if [ -z "$LATEST" ]; then
          NEXT="v1.0.0"
        else
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEXT="v1.0.$((PATCH + 1))"
        fi

        echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
        echo "Next tag: $NEXT"

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ steps.next-tag.outputs.tag }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download current task definition
      run: |
        aws ecs describe-task-definition \
          --task-definition ${{ env.ECS_TASK_DEFINITION_FAMILY }} \
          --query taskDefinition > task-definition.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
